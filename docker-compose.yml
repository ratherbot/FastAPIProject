version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password_123
      POSTGRES_DB: task_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    container_name: task_tracker_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password_123
      - POSTGRES_DB=task_tracker
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: task_tracker_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data: